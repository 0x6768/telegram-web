name: Update Domain Configurations
on:
  workflow_dispatch:
    inputs:
      custom_domain:
        description: 'Custom domain (e.g., your-domain.com)'
        required: true
        default: 'your-domain.com'
        type: string
      pr_title:
        description: 'Pull Request title'
        required: true
        default: 'chore: update domain configurations'
        type: string
      pr_body:
        description: 'Pull Request description'
        required: true
        default: |
          Automated domain configuration update:
          1. Added custom domain to whitelist in `src/limits.ts`
          2. Updated DC server addresses in `src/lib/gramjs/Utils.ts`
          3. Updated related domain configurations in `src/config.ts`
        type: string
      target_branch:
        description: 'Target branch for PR'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  update-domains:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.target_branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 1. Update src/limits.ts - Add to whitelist
        run: |
          DOMAIN="${{ inputs.custom_domain }}"
          FILE="src/limits.ts"
          
          if [ ! -f "$FILE" ]; then
            echo "Error: File $FILE does not exist"
            exit 1
          fi
          
          echo "Updating whitelistedDomains in $FILE..."
          
          # Create a backup
          cp "$FILE" "$FILE.bak"
          
          # Use sed to add domain to whitelistedDomains array
          # Find the whitelistedDomains array and add domain before closing bracket
          sed -i "/whitelistedDomains: \[/,/\]/ {
            /\]/i\
\ \ \ \ '$DOMAIN',
          }" "$FILE"
          
          # Verify the change
          if grep -q "'$DOMAIN'" "$FILE"; then
            echo "✓ Successfully added domain to whitelist in $FILE"
            echo "Updated whitelistedDomains array:"
            grep -A 15 "whitelistedDomains: \[" "$FILE" | head -20
          else
            echo "⚠ Failed to add domain. Trying alternative method..."
            # Alternative method using awk
            awk -v domain="'$DOMAIN'" '
            /whitelistedDomains: \[/ {
              print $0
              in_array = 1
              next
            }
            in_array && /\]/ && !added {
              print "    " domain ","
              print $0
              added = 1
              in_array = 0
              next
            }
            in_array {
              print $0
              next
            }
            { print $0 }
            ' "$FILE.bak" > "$FILE"
            
            if grep -q "'$DOMAIN'" "$FILE"; then
              echo "✓ Successfully added domain using alternative method"
            else
              echo "❌ Failed to add domain. Please check file format."
              exit 1
            fi
          fi

      - name: 2. Update src/lib/gramjs/Utils.ts - Replace DC servers
        run: |
          DOMAIN="${{ inputs.custom_domain }}"
          FILE="src/lib/gramjs/Utils.ts"
          
          if [ ! -f "$FILE" ]; then
            echo "Error: File $FILE does not exist"
            exit 1
          fi
          
          echo "Updating DC server domains in $FILE..."
          
          # Backup original file
          cp "$FILE" "$FILE.backup"
          
          # Replace all occurrences of web.telegram.org with custom domain
          sed -i "s/web\.telegram\.org/$DOMAIN/g" "$FILE"
          
          echo "✓ Updated DC server domains in $FILE"
          echo "Sample changes:"
          grep -n "zws.*\." "$FILE" | head -10 || true

      - name: 3. Update src/config.ts - Replace related domains
        run: |
          DOMAIN="${{ inputs.custom_domain }}"
          FILE="src/config.ts"
          
          if [ ! -f "$FILE" ]; then
            echo "⚠ Note: $FILE does not exist, skipping"
            exit 0
          fi
          
          echo "Updating domains in $FILE..."
          
          # Create backup
          cp "$FILE" "$FILE.backup"
          
          # Replace various Telegram domains
          sed -i "s/web\.telegram\.org/$DOMAIN/g" "$FILE"
          sed -i "s/telegram\.org/$DOMAIN/g" "$FILE"
          sed -i "s/telegram\.dog/$DOMAIN/g" "$FILE"
          sed -i "s/telegram\.me/$DOMAIN/g" "$FILE"
          sed -i "s/t\.me/$DOMAIN/g" "$FILE"
          
          echo "✓ Updated domain configurations in $FILE"
          echo "Changes preview:"
          grep -n "\.org\|\.me\|\.dog\|$DOMAIN" "$FILE" | head -10 || true

      - name: 4. Run TypeScript validation (optional)
        run: |
          if [ -f "package.json" ]; then
            echo "Checking for TypeScript..."
            if grep -q "typescript" package.json; then
              echo "Running TypeScript compiler check..."
              npx tsc --noEmit || echo "TypeScript check completed (warnings are OK)"
            else
              echo "TypeScript not found in package.json, skipping"
            fi
          else
            echo "package.json not found, skipping TypeScript check"
          fi

      - name: 5. Verify changes
        run: |
          echo "=== Change Summary ==="
          echo ""
          
          echo "1. Modified files:"
          git status --porcelain | grep -E "^ M|^A" || echo "No changes detected"
          
          echo ""
          echo "2. src/limits.ts whitelist update:"
          if [ -f "src/limits.ts" ]; then
            grep -A 10 "whitelistedDomains:" src/limits.ts || true
          fi
          
          echo ""
          echo "3. src/lib/gramjs/Utils.ts DC server update:"
          if [ -f "src/lib/gramjs/Utils.ts" ]; then
            grep -n "zws[0-9]" src/lib/gramjs/Utils.ts | head -5 || true
          fi
          
          echo ""
          echo "4. src/config.ts domain updates:"
          if [ -f "src/config.ts" ]; then
            grep -n "${{ inputs.custom_domain }}" src/config.ts | head -5 || true
          fi

      - name: 6. Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update domain configuration to ${{ inputs.custom_domain }}"
          title: "${{ inputs.pr_title }}"
          body: |
            ${{ inputs.pr_body }}
            
            ### Changes made:
            - ✅ Added `${{ inputs.custom_domain }}` to whitelisted domains in `src/limits.ts`
            - ✅ Updated DC server addresses in `src/lib/gramjs/Utils.ts`
            - ✅ Updated domain configurations in `src/config.ts`
            
            ### Verification:
            - [ ] Check that the domain is correctly added to whitelist
            - [ ] Verify DC server addresses are updated
            - [ ] Test with the new domain configuration
          branch: "update-domain-${{ github.run_id }}-${{ github.run_attempt }}"
          base: "${{ inputs.target_branch }}"
          delete-branch: true
          labels: |
            automated
            configuration
            domain-update
          assignees: ""
          reviewers: ""
          draft: false
          add-paths: |
            src/limits.ts
            src/lib/gramjs/Utils.ts
            src/config.ts

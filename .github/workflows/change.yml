name: Update Telegram Domain
on:
  workflow_dispatch:
    inputs:
      domain:
        description: '新域名 (替换 web.telegram.org)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update files
        run: |
          # 1. 修改 Utils.ts
          sed -i "s|zws\([0-9]\)\(-1\)\{0,1\}\.web\.telegram\.org|zws\1\2_${{ inputs.domain }}|g" src/lib/gramjs/Utils.ts
          
          # 2. 添加白名单
          awk -v domain="\"${{ inputs.domain }}\"," '
          /whitelistedDomains: \[/ {in_array=1}
          in_array && /\]/ && !added {print "    " domain; added=1}
          {print $0}
          ' src/limits.ts > tmp && mv tmp src/limits.ts
          
          # 3. 修改 config.ts
          [ -f src/config.ts ] && sed -i "s|web\.telegram\.org|${{ inputs.domain }}|g" src/config.ts
          
      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/
          # 有修改就提交，没修改就跳过
          git diff --cached --quiet || git commit -m "update domain to ${{ inputs.domain }}"
          git push

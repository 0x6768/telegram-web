name: Update Telegram Domains
on:
  workflow_dispatch:
    inputs:
      domain:
        description: '替换 web.telegram.org 的新域名'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 1. 修改 src/lib/gramjs/Utils.ts
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/lib/gramjs/Utils.ts"
          
          echo "正在修改 Utils.ts..."
          
          # 替换 1-5 的所有 DC
          for i in 1 2 3 4 5; do
            sed -i "s|\`zws${i}\${downloadDC ? '-1' : ''}\.web\.telegram\.org\`|\`zws${i}\${downloadDC ? '-1' : ''}_$DOMAIN\`|g" "$FILE"
          done
          
          echo "✅ Utils.ts 修改完成"
          
      - name: 2. 修改 src/config.ts
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/config.ts"
          
          if [ ! -f "$FILE" ]; then
            echo "⚠ config.ts 不存在，跳过"
            exit 0
          fi
          
          echo "正在修改 config.ts..."
          
          # 只替换 web.telegram.org
          sed -i "s|web\.telegram\.org|$DOMAIN|g" "$FILE"
          
          echo "✅ config.ts 修改完成"
          
      - name: 3. 在 src/limits.ts 中添加白名单
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/limits.ts"
          
          echo "正在添加域名到白名单..."
          
          # 在 whitelistedDomains 数组中添加
          awk -v domain="\"$DOMAIN\"," '
          /whitelistedDomains: \[/ {in_array=1}
          in_array && /\]/ && !added {print "    " domain; added=1}
          {print $0}
          ' "$FILE" > tmp && mv tmp "$FILE"
          
          echo "✅ 已添加到白名单"
          
      - name: 4. 提交并推送
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/
          git commit -m "update: replace web.telegram.org with ${{ inputs.domain }}" 2>/dev/null || true
          git push

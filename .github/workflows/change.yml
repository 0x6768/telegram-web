name: Fix Template String Domains
on:
  workflow_dispatch:
    inputs:
      domain:
        description: 'Your domain (e.g., tg.example.com)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Process template strings
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/lib/gramjs/Utils.ts"
          
          echo "Processing template strings in $FILE..."
          
          # 处理 zws1.web.telegram.org → zws1_$DOMAIN
          sed -i "s|zws\([0-9]\)\.web\.telegram\.org|zws\1_$DOMAIN|g" "$FILE"
          
          # 处理 zws1-1.web.telegram.org → zws1-1_$DOMAIN
          sed -i "s|zws\([0-9]\)-1\.web\.telegram\.org|zws\1-1_$DOMAIN|g" "$FILE"
          
          # 处理 zwsX${downloadDC ? '-1' : ''}.web.telegram.org
          # 这个需要更复杂的处理
          sed -i "s|\`zws\([0-9]\)\${downloadDC ? '-1' : ''}\.web\.telegram\.org\`|\`zws\1\${downloadDC ? '-1' : ''}_$DOMAIN\`|g" "$FILE"
          
          echo "Done!"
          echo "Result preview:"
          grep -n "zws" "$FILE" | head -10
          
      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/lib/gramjs/Utils.ts
          git commit -m "Fix template string domains" || echo "No changes"
          git push

name: Update Telegram Domain
on:
  workflow_dispatch:
    inputs:
      domain:
        description: '新域名'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Replace domain in Utils.ts
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/lib/gramjs/Utils.ts"
          
          # 正确的正则：匹配整个模板字符串
          # 注意：需要转义 $ 和 {
          sed -i "s|\`zws\([0-9]\)\${downloadDC ? '-1' : ''}\.web\.telegram\.org\`|\`zws\1\${downloadDC ? '-1' : ''}_$DOMAIN\`|g" "$FILE"
          
          echo "✅ 已更新模板字符串"
          
      - name: Add to whitelist
        run: |
          DOMAIN="${{ inputs.domain }}"
          FILE="src/limits.ts"
          
          # 在 whitelistedDomains 数组中添加
          awk -v domain="\"$DOMAIN\"," '
          /whitelistedDomains: \[/ {in_array=1}
          in_array && /\]/ && !added {print "    " domain; added=1}
          {print $0}
          ' "$FILE" > tmp && mv tmp "$FILE"
          
      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add src/
          git commit -m "update domain to ${{ inputs.domain }}" 2>/dev/null || true
          git push

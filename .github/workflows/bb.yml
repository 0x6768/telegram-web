name: Build Telegram Web

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: 'API ID'
        required: true
        type: string
      api_hash:
        description: 'API Hash'
        required: true
        type: string
      domain:
        description: 'Domain'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          
      - name: Install dependencies
        run: npm ci --silent
        
      - name: Create config
        run: |
          echo "TELEGRAM_API_ID=${{ github.event.inputs.api_id }}" > .env
          echo "TELEGRAM_API_HASH=${{ github.event.inputs.api_hash }}" >> .env
          echo "BASE_URL=${{ github.event.inputs.domain }}" >> .env
          
      - name: Build
        run: npm run build:production
        
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "build-$(date +%Y%m%d-%H%M%S)"
          release_name: "Build $(date +'%Y-%m-%d %H:%M')"
          body: |
            Automated build
            - SHA: ${{ github.sha }}
            - Time: $(date)
          draft: false
          prerelease: false
          generate_release_notes: true  # 自动生成 release notes
      
      - name: Upload Assets
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./dist/
          asset_name: build-${{ github.sha }}.zip
          asset_content_type: application/zip

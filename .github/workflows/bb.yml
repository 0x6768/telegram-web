name: Build Telegram Web

on:
  workflow_dispatch:
    inputs:
      api_id:
        description: 'API ID'
        required: true
        type: string
      api_hash:
        description: 'API Hash'
        required: true
        type: string
      domain:
        description: 'Domain'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci --silent
        
      - name: Create config
        run: |
          echo "TELEGRAM_API_ID=${{ github.event.inputs.api_id }}" > .env
          echo "TELEGRAM_API_HASH=${{ github.event.inputs.api_hash }}" >> .env
          echo "BASE_URL=${{ github.event.inputs.domain }}" >> .env
          
      - name: Build
        run: npm run build:production
        
      - name: Create release with gh
        run: |
          # 生成 tag
          TAG="build-$(date +%Y%m%d-%H%M%S)"
          
          # 用 gh 创建 release
          gh release create $TAG \
            --title "Telegram Web $TAG" \
            --notes "Built on $(date)" \
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
